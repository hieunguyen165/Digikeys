::-webkit-scrollbar{width:6px}
.btn{cursor:pointer;border:none;border-radius:8px;font-size:14px;font-weight:600;padding:10px 20px;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff}

body.dark .hero{border-color:#1e1e30}

.product-card:hover{transform:translateY(-3px);box-shadow:0 8px 32px rgba(124,58,237,.15)}
.product-icon{width:52px;height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:14px;flex-shrink:0}
.product-name{font-size:17px;font-weight:700;margin-bottom:6px}

.form-grid{display:grid;gap:14px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.variant-btn{padding:10px 16px;border-radius:10px;border:1.5px solid;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;position:relative;text-align:center;min-width:90px}

.qr-box{border:1px solid;border-radius:14px;padding:20px;text-align:center;transition:background .3s}
.bank-info{border:1px solid;border-radius:10px;padding:14px;text-align:left;margin-top:14px;transition:background .3s}
.bank-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;font-size:13px;border-bottom:1px solid}
.bank-row:last-child{border-bottom:none}
.bank-val{font-weight:600;font-family:monospace;font-size:13px;word-break:break-all;text-align:right}
body.dark .bank-val{color:#e8e8f0}
body.light .bank-val{color:#1a1a2a}
.copy-btn{border:1px solid;border-radius:6px;padding:3px 10px;font-size:11px;cursor:pointer;font-weight:700;flex-shrink:0;margin-left:8px}
.step{display:flex;gap:12px;margin-bottom:12px;align-items:flex-start;font-size:14px}
.step-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:1px}
.toggle-btn{border:1px solid;border-radius:8px;padding:7px 12px;cursor:pointer;font-size:14px;transition:all .2s;background:none;display:flex;align-items:center;gap:6px;font-weight:600}
@media(max-width:640px){.form-row{grid-template-columns:1fr}.admin-sidebar{display:none}.products-grid{grid-template-columns:1fr;padding:16px}.modal{padding:20px}}
</style>

function formatVND(n){return new Intl.NumberFormat('vi-VN').format(n)+'đ';}
function fmtDate(d){return new Date(d).toLocaleDateString('vi-VN');}

function Toast({toast}){
  if(!toast)return null;
  const e=toast.type==='error';
  return <div style={{position:'fixed',top:18,right:18,zIndex:9999,background:e?'#450a0a':'#064e3b',border:`1px solid ${e?'#f87171':'#34d399'}`,color:e?'#f87171':'#34d399',padding:'11px 18px',borderRadius:10,fontSize:14,fontWeight:600,maxWidth:320}}>{toast.msg}</div>;
}

function ThemeToggle({dark,toggle}){
  return(
    <button className="toggle-btn" onClick={toggle} title={dark?'Chuyển sang sáng':'Chuyển sang tối'}>
      <span style={{fontSize:16}}>{dark?'☀️':'🌙'}</span>
      <span style={{fontSize:13}}>{dark?'Sáng':'Tối'}</span>
    </button>
  );
}

  const [pVariants,setPVariants]=useState([{id:'v1',label:'1 tháng',price:'',best:false}]);
  const [newAcc,setNewAcc]=useState({productId:'',email:'',password:''});

  const revenue=orders.filter(o=>o.status==='delivered').reduce((s,o)=>s+o.price,0);
  const pending=orders.filter(o=>o.status==='pending').length;

  const addVRow=()=>setPVariants(v=>[...v,{id:'v'+Date.now(),label:'',price:'',best:false}]);
  const removeVRow=(id)=>setPVariants(v=>v.filter(r=>r.id!==id));
  const updateV=(id,f,val)=>setPVariants(v=>v.map(r=>r.id===id?{...r,[f]:val}:r));

  const saveProduct=()=>{
    if(!newProduct.name){showToast('Nhập tên sản phẩm','error');return;}
    const ok=pVariants.filter(v=>v.label&&v.price);
    if(!ok.length){showToast('Thêm ít nhất 1 biến thể','error');return;}
    setProducts(prev=>[...prev,{...newProduct,id:Date.now(),benefits:newProduct.benefits.split('\n').filter(Boolean),variants:ok.map(v=>({...v,price:parseInt(v.price)}))}]);
    setNewProduct(emptyP);setPVariants([{id:'v1',label:'1 tháng',price:'',best:false}]);
    showToast('Đã thêm sản phẩm!');setAdminTab('products');
  };

  const deliverOrder=(orderId)=>{
    const ord=orders.find(o=>o.id===orderId);
    const acc=accounts.find(a=>a.productId===ord.productId&&a.status==='available');
    if(acc){
      setAccounts(p=>p.map(a=>a.id===acc.id?{...a,status:'used',assignedTo:orderId}:a));
      setOrders(p=>p.map(o=>o.id===orderId?{...o,status:'delivered',accountInfo:{email:acc.email,password:acc.password}}:o));
      showToast('Đã giao tài khoản!');
    }else showToast('Không có tài khoản trống!','error');
  };

  const addAccount=()=>{
    if(!newAcc.productId||!newAcc.email||!newAcc.password){showToast('Điền đầy đủ thông tin','error');return;}
    const prod=products.find(p=>p.id===parseInt(newAcc.productId));
    setAccounts(prev=>[...prev,{id:Date.now(),...newAcc,productId:parseInt(newAcc.productId),productName:prod?.name||'',status:'available',assignedTo:null}]);
    setNewAcc({productId:'',email:'',password:''});showToast('Đã thêm vào kho!');
  };

  const menu=[{id:'dashboard',icon:'📊',label:'Dashboard'},{id:'products',icon:'📦',label:'Sản phẩm'},{id:'addproduct',icon:'➕',label:'Thêm sản phẩm'},{id:'orders',icon:'🛒',label:'Đơn hàng'},{id:'accounts',icon:'🔑',label:'Kho tài khoản'}];

  return(
    <div style={{minHeight:'100vh'}}>
      <Toast toast={toast}/>
      <nav>
        <div className="logo" style={{cursor:'default'}}>DigiKeys Admin</div>
        <div className="nav-links">
          <button className="toggle-btn" onClick={toggleTheme} title="Đổi giao diện"><span style={{fontSize:16}}>{dark?'☀️':'🌙'}</span><span style={{fontSize:13}}>{dark?'Sáng':'Tối'}</span></button>
          <button className="btn btn-outline btn-sm" onClick={()=>setPage('home')}>🏪 Xem Shop</button>
          <button className="btn btn-outline btn-sm" onClick={()=>{setPage('home');setUser(null);}}>Đăng xuất</button>
        </div>
      </nav>
      <div className="admin-layout">
        <div className="admin-sidebar">
          {menu.map(m=>(
            <div key={m.id} className={`admin-menu-item${adminTab===m.id?' active':''}`} onClick={()=>setAdminTab(m.id)}>
              <span style={{fontSize:15}}>{m.icon}</span>{m.label}
            </div>
          ))}
        </div>
        <div className="admin-main">

          {adminTab==='dashboard'&&<>
            <h2 className="text-primary" style={{marginBottom:20}}>Tổng quan</h2>
            <div className="stats-grid">
              {[{l:'Tổng đơn',v:orders.length},{l:'Đã giao',v:orders.filter(o=>o.status==='delivered').length,c:'#34d399'},{l:'Chờ xử lý',v:pending,c:'#fbbf24'},{l:'Doanh thu',v:formatVND(revenue),sm:true},{l:'Sản phẩm',v:products.length,c:'#60a5fa'},{l:'TK trống',v:accounts.filter(a=>a.status==='available').length,c:'#c084fc'}].map(s=>(
                <div key={s.l} className="stat-card"><div className="stat-label">{s.l}</div><div className="stat-value" style={{color:s.c||(dark?'#a855f7':'#7c3aed'),fontSize:s.sm?16:24}}>{s.v}</div></div>
              ))}
            </div>
            {pending>0&&<div className="warn-box" style={{border:'1px solid',borderRadius:12,padding:16,marginBottom:20}}>
              <div style={{color:'#d97706',fontWeight:700,marginBottom:4}}>⚠️ {pending} đơn đang chờ giao</div>
              <div style={{fontSize:13,color:dark?'#b45309':'#92400e'}}>Vào Đơn hàng → bấm "✓ Giao" để gắn tài khoản tự động.</div>
              <button style={{marginTop:10,background:'#d97706',color:'#fff',border:'none',padding:'6px 14px',borderRadius:6,cursor:'pointer',fontSize:13,fontWeight:600}} onClick={()=>setAdminTab('orders')}>Xem đơn →</button>
            </div>}
            <div className="section-title text-faint">Đơn gần đây</div>
            <div className="table-wrapper"><table>
              <thead className="table-header"><tr><th>ID</th><th>Sản phẩm</th><th>Gói</th><th>Ngày</th><th>Giá</th><th>Trạng thái</th></tr></thead>
              <tbody>{[...orders].reverse().slice(0,8).map(o=>(
                <tr key={o.id}>
                  <td className="text-faint" style={{fontFamily:'monospace',fontSize:11}}>{o.id}</td>
                  <td className="text-primary" style={{fontWeight:600}}>{o.productName}</td>
                  <td className="text-muted" style={{fontSize:12}}>{o.variantLabel}</td>
                  <td className="text-faint" style={{fontSize:12}}>{fmtDate(o.date)}</td>
                  <td style={{color:dark?'#a855f7':'#7c3aed',fontWeight:700}}>{formatVND(o.price)}</td>
                  <td><span className={`badge ${o.status==='delivered'?'badge-green':'badge-yellow'}`}>{o.status==='delivered'?'Đã giao':'Chờ'}</span></td>
                </tr>
              ))}</tbody>
            </table></div>
          </>}

          {adminTab==='products'&&<>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
              <h2 className="text-primary">Sản phẩm ({products.length})</h2>
              <button className="btn btn-primary btn-sm" onClick={()=>setAdminTab('addproduct')}>+ Thêm</button>
            </div>
            <div className="table-wrapper"><table>
              <thead className="table-header"><tr><th></th><th>Tên</th><th>Biến thể & Giá</th><th>Giá từ</th><th></th></tr></thead>
              <tbody>{products.map(p=>(
                <tr key={p.id}>
                  <td style={{fontSize:22,width:40}}>{p.icon}</td>
                  <td><div className="text-primary" style={{fontWeight:600}}>{p.name}</div><div className="text-faint" style={{fontSize:12}}>{p.shortDesc}</div></td>
                  <td><div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                    {p.variants.map(v=><span key={v.id} className={`tag-pill${v.best?' best':''}`} style={{fontSize:11,padding:'2px 8px',borderRadius:5,border:'1px solid'}}>{v.label} · {formatVND(v.price)}</span>)}
                  </div></td>
                  <td style={{color:dark?'#a855f7':'#7c3aed',fontWeight:700}}>{formatVND(Math.min(...p.variants.map(v=>v.price)))}</td>
                  <td><button className="btn btn-danger btn-sm" onClick={()=>{setProducts(pp=>pp.filter(x=>x.id!==p.id));showToast('Đã xóa');}}>Xóa</button></td>
                </tr>
              ))}</tbody>
            </table></div>
          </>}

          {adminTab==='addproduct'&&<>
            <h2 className="text-primary" style={{marginBottom:20}}>Thêm sản phẩm mới</h2>
            <div className="card-bg" style={{border:`1px solid ${dark?'#1e1e30':'#e8e5f2'}`,borderRadius:16,padding:24,maxWidth:640}}>
              <div className="form-grid">
                <div className="form-row">
                  <div><label>Tên sản phẩm *</label><input value={newProduct.name} onChange={e=>setNewProduct({...newProduct,name:e.target.value})} placeholder="Canva Pro"/></div>
                  <div><label>Icon emoji</label><input value={newProduct.icon} onChange={e=>setNewProduct({...newProduct,icon:e.target.value})} placeholder="🎨"/></div>
                </div>
                <div className="form-row">
                  <div><label>Tag hiển thị</label><input value={newProduct.tag} onChange={e=>setNewProduct({...newProduct,tag:e.target.value})} placeholder="Hot / Mới / Bán chạy"/></div>
                  <div><label>Màu icon hex</label><input value={newProduct.color} onChange={e=>setNewProduct({...newProduct,color:e.target.value})} placeholder="#7c3aed"/></div>
                </div>
                <div><label>Mô tả ngắn</label><input value={newProduct.shortDesc} onChange={e=>setNewProduct({...newProduct,shortDesc:e.target.value})} placeholder="Thiết kế chuyên nghiệp..."/></div>
                <div><label>Mô tả đầy đủ</label><textarea rows={3} style={{resize:'vertical'}} value={newProduct.desc} onChange={e=>setNewProduct({...newProduct,desc:e.target.value})}/></div>
                <div><label>Quyền lợi (mỗi dòng 1 mục)</label><textarea rows={4} style={{resize:'vertical'}} value={newProduct.benefits} onChange={e=>setNewProduct({...newProduct,benefits:e.target.value})} placeholder="Không quảng cáo&#10;Tải offline&#10;Chất lượng 4K"/></div>
                <div><label>Hướng dẫn sử dụng</label><textarea rows={2} style={{resize:'vertical'}} value={newProduct.guide} onChange={e=>setNewProduct({...newProduct,guide:e.target.value})}/></div>
                <div>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                    <label style={{marginBottom:0,fontWeight:700,fontSize:14}} className="text-primary">Biến thể / Gói giá *</label>
                    <button className="btn btn-outline btn-sm" onClick={addVRow}>+ Thêm gói</button>
                  </div>
                  <div className="variant-builder" style={{border:`1px solid ${dark?'#1e1e30':'#e8e5f2'}`,borderRadius:10,padding:14}}>
                    <div style={{display:'grid',gridTemplateColumns:'1.8fr 1fr 90px 36px',gap:8,marginBottom:8,fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:.5}} className="text-faint">
                      <span>Tên gói</span><span>Giá (VNĐ)</span><span>Nổi bật</span><span></span>
                    </div>
                    {pVariants.map(v=>(
                      <div key={v.id} style={{display:'grid',gridTemplateColumns:'1.8fr 1fr 90px 36px',gap:8,alignItems:'center',marginBottom:8}}>
                        <input value={v.label} onChange={e=>updateV(v.id,'label',e.target.value)} placeholder="1 tháng"/>
                        <input type="number" value={v.price} onChange={e=>updateV(v.id,'price',e.target.value)} placeholder="59000"/>
                        <select value={v.best?'yes':'no'} onChange={e=>updateV(v.id,'best',e.target.value==='yes')} style={{padding:'10px 8px'}}>
                          <option value="no">Không</option>
                          <option value="yes">⭐ HOT</option>
                        </select>
                        <button style={{background:pVariants.length===1?'transparent':'#dc2626',border:`1px solid ${pVariants.length===1?(dark?'#2a2a3e':'#d8d4ee'):'#dc2626'}`,color:pVariants.length===1?(dark?'#333':'#c0bdd8'):'#fff',borderRadius:6,cursor:pVariants.length===1?'not-allowed':'pointer',fontSize:18,lineHeight:1,padding:'6px 8px',width:36}} onClick={()=>removeVRow(v.id)} disabled={pVariants.length===1}>×</button>
                      </div>
                    ))}
                  </div>
                </div>
                <div style={{display:'flex',gap:12}}>
                  <button className="btn btn-primary" onClick={saveProduct}>Lưu sản phẩm</button>
                  <button className="btn btn-outline" onClick={()=>setAdminTab('products')}>Hủy</button>
                </div>
              </div>
            </div>
          </>}

          {adminTab==='orders'&&<>
            <h2 className="text-primary" style={{marginBottom:18}}>Quản lý đơn hàng</h2>
            <div className="table-wrapper"><table>
              <thead className="table-header"><tr><th>ID</th><th>Sản phẩm</th><th>Gói</th><th>Ngày</th><th>Giá</th><th>Trạng thái</th><th>Thao tác</th></tr></thead>
              <tbody>{[...orders].reverse().map(o=>(
                <tr key={o.id}>
                  <td className="text-faint" style={{fontFamily:'monospace',fontSize:11}}>{o.id}</td>
                  <td className="text-primary" style={{fontWeight:600}}>{o.productName}</td>
                  <td className="text-muted" style={{fontSize:12}}>{o.variantLabel}</td>
                  <td className="text-faint" style={{fontSize:12}}>{fmtDate(o.date)}</td>
                  <td style={{color:dark?'#a855f7':'#7c3aed',fontWeight:700}}>{formatVND(o.price)}</td>
                  <td><span className={`badge ${o.status==='delivered'?'badge-green':'badge-yellow'}`}>{o.status==='delivered'?'Đã giao':'Chờ xử lý'}</span></td>
                  <td>
                    {o.status==='pending'&&<button className="btn btn-success btn-sm" onClick={()=>deliverOrder(o.id)}>✓ Giao</button>}
                    {o.status==='delivered'&&o.accountInfo&&<div style={{fontSize:11,color:'#34d399',fontFamily:'monospace',maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>✓ {o.accountInfo.email}</div>}
                  </td>
                </tr>
              ))}</tbody>
            </table></div>
          </>}

          {adminTab==='accounts'&&<>
            <h2 className="text-primary" style={{marginBottom:18}}>Kho tài khoản</h2>
            <div className="card-bg" style={{border:`1px solid ${dark?'#1e1e30':'#e8e5f2'}`,borderRadius:16,padding:24,marginBottom:20}}>
              <div className="text-primary" style={{fontWeight:700,marginBottom:14,fontSize:15}}>Nhập tài khoản mới vào kho</div>
              <div className="form-grid">
                <div><label>Sản phẩm</label>
                  <select value={newAcc.productId} onChange={e=>setNewAcc({...newAcc,productId:e.target.value})}>
                    <option value="">Chọn sản phẩm...</option>
                    {products.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
                  </select>
                </div>
                <div className="form-row">
                  <div><label>Email / Username</label><input value={newAcc.email} onChange={e=>setNewAcc({...newAcc,email:e.target.value})} placeholder="email@gmail.com"/></div>
                  <div><label>Mật khẩu / Key</label><input value={newAcc.password} onChange={e=>setNewAcc({...newAcc,password:e.target.value})} placeholder="Password hoặc key"/></div>
                </div>
                <div><button className="btn btn-primary" style={{width:'auto'}} onClick={addAccount}>+ Thêm vào kho</button></div>
              </div>
            </div>
            <div className="section-title text-faint">Kho ({accounts.length}) — Trống: {accounts.filter(a=>a.status==='available').length}</div>
            <div className="table-wrapper"><table>
              <thead className="table-header"><tr><th>Sản phẩm</th><th>Email</th><th>Mật khẩu</th><th>Trạng thái</th><th>Đơn</th><th></th></tr></thead>
              <tbody>{accounts.map(a=>(
                <tr key={a.id}>
                  <td className="text-primary" style={{fontWeight:600}}>{a.productName}</td>
                  <td style={{fontFamily:'monospace',fontSize:12}} className="text-primary">{a.email}</td>
                  <td style={{fontFamily:'monospace',fontSize:12}} className="text-primary">{a.password}</td>
                  <td><span className={`badge ${a.status==='available'?'badge-green':'badge-yellow'}`}>{a.status==='available'?'Trống':'Đã dùng'}</span></td>
                  <td className="text-faint" style={{fontSize:11}}>{a.assignedTo||'—'}</td>
                  <td>{a.status==='available'&&<button className="btn btn-danger btn-sm" onClick={()=>{setAccounts(p=>p.filter(x=>x.id!==a.id));showToast('Đã xóa');}}>Xóa</button>}</td>
                </tr>
              ))}</tbody>
            </table></div>
          </>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
